<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Social Mirror</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  margin-top: 20px;
}

button {
  background: black;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  margin-top: 20px;
  cursor: pointer;
}

.progress {
  color: gray;
  margin-bottom: 10px;
}

.option {
  margin: 12px 0;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.option:hover {
  background: #f0f0f0;
}

.hidden {
  display: none;
}

h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<div class="container">

<!-- INTRO -->
<div id="intro" class="card">
  <h1>Your Social Mirror</h1>
  <p>This quiz doesn’t tell you how people see you.</p>
  <p>It reveals how you <b>believe</b> they see you.</p>
  <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">
  <div class="progress" id="progress"></div>
  <div id="question"></div>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden"></div>

</div>

<script>
const questions = [
{
q: "You’re having a really good conversation with someone over text. The flow is natural, engaging—and then after your last message, they stop replying. You notice they’ve been online since then.",
options: [
"They’re probably caught up in something else right now",
"Maybe they’ll reply when they’re free",
"Did I say something that changed the vibe?",
"They’ve lost interest in talking to me"
]
},
{
q: "You’re talking to someone, and mid-conversation their energy shifts. Their replies become shorter, less expressive, and the warmth feels reduced.",
options: [
"Their mood probably shifted for some reason",
"Maybe they’re just tired or distracted",
"Did I do something wrong here?",
"They’re not enjoying this conversation anymore"
]
},
{
q: "You walk into a room where a group is already deeply engaged in conversation. No one immediately acknowledges your presence.",
options: [
"They’re just in the flow of their conversation",
"I’ll wait and join when it feels natural",
"That felt slightly off",
"They don’t really want me here"
]
},
{
q: "Someone compliments you in front of others, and the people around don’t react much.",
options: [
"That’s kind of them, I’ll take it",
"Nice, I appreciate it",
"Do they actually mean it?",
"They’re just saying it to be polite"
]
},
{
q: "You’re sitting with people and they start laughing, occasionally glancing in your direction.",
options: [
"Probably unrelated to me",
"Could just be coincidence",
"I wonder if it’s about me",
"They’re talking about me"
]
},
{
q: "A friend cancels plans at the last moment with a short message and no explanation.",
options: [
"Things come up, it’s okay",
"Maybe something urgent happened",
"Maybe they didn’t feel like meeting",
"They didn’t really want to meet me"
]
},
{
q: "You open up about something personal, but the response you receive is brief and the topic shifts quickly.",
options: [
"Not everyone knows how to respond",
"Maybe they didn’t know what to say",
"Maybe I shared too much",
"They don’t care about what I said"
]
},
{
q: "You make a small but noticeable mistake in front of others.",
options: [
"It’s normal, people move on",
"It happens, no big deal",
"People probably noticed that",
"People now see me differently"
]
},
{
q: "Later, you find out that others made a plan and you weren’t included.",
options: [
"It might have been spontaneous",
"Could be situational",
"Maybe they forgot to include me",
"They chose not to include me"
]
},
{
q: "Someone reads your message but replies much later, even though they were active.",
options: [
"They’ll respond when they can",
"Maybe they were thinking what to say",
"That feels a bit off",
"They’re avoiding the conversation"
]
},
{
q: "You notice a subtle shift in how someone talks to you compared to before.",
options: [
"Could be unrelated to me",
"Maybe they’re having a rough day",
"Did I cause this shift somehow?",
"Something is wrong between us"
]
},
{
q: "In a group setting, you’re quieter than usual and mostly listening.",
options: [
"I’m just taking it in",
"It’s okay to not speak much",
"People might notice this",
"They think I don’t add value"
]
},
{
q: "You greet someone you know, but they don’t respond immediately.",
options: [
"They probably didn’t notice",
"Maybe they’re distracted",
"That felt a bit uncomfortable",
"They ignored me"
]
},
{
q: "You post something you liked online, but it gets very little engagement.",
options: [
"Reach varies, it’s normal",
"Not everyone saw it",
"Maybe it didn’t land well",
"People didn’t like it"
]
},
{
q: "You receive feedback or criticism from someone you respect.",
options: [
"This can help me improve",
"I’ll reflect on it",
"Maybe I made a mistake",
"They see me negatively now"
]
// (keeping rest same for brevity—you can reuse previous list)
];

let current = 0;
let answers = [];

function startQuiz(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("progress").innerText = `Question ${current+1} of ${questions.length}`;
  document.getElementById("question").innerHTML = `<h3>${q.q}</h3>`;

  let html="";
  q.options.forEach((opt,i)=>{
    html+=`<div class="option" onclick="selectOption(${i+1}, this)">${opt}</div>`;
  });
  document.getElementById("options").innerHTML=html;
}

let selectedVal=null;

function selectOption(val, el){
  selectedVal = val;
  document.querySelectorAll(".option").forEach(o=>o.style.background="white");
  el.style.background="#e8f0ff";
}

function nextQuestion(){
  if(!selectedVal){
    alert("Select an option");
    return;
  }
  answers.push(selectedVal);
  selectedVal=null;
  current++;

  if(current<questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let total = answers.reduce((a,b)=>a+b,0);
  let countD = answers.filter(x=>x===4).length;

  let resultHTML="";
  let trait="";

  if(countD>=7){
    trait=`<h3>🧩 Hidden Trait: Conclusion Jumper</h3>
    <p>You don’t stay in uncertainty—you move quickly toward conclusions.</p>`;
  }

  if(total<=50){
    resultHTML = `
    <h2>🌊 THE OVER-INTERPRETER</h2>

    <h3>🧠 What this says about you</h3>
    <p>Moments don’t just pass—you analyze them.
    A delay, a tone shift, a small reaction… everything starts to feel meaningful.</p>

    <p>You’re not making things up—
    but you’re often adding layers that may not exist.</p>

    <h3>🔍 Why you think this way</h3>
    <p>Your mind is trying to stay ahead—to protect you.
    So it looks for patterns, even in small things.</p>

    <h3>⚠️ Your blind spot</h3>
    <p>You start treating possibilities like conclusions.</p>

    <h3>🔄 Shift</h3>
    <p><i>Not every pattern I notice is about me.</i></p>
    `;
  }

  document.getElementById("result").innerHTML =
    resultHTML + trait +
    `<hr><p><b>This reveals how you THINK people see you.</b></p>`;
}
</script>

</body>
</html>
