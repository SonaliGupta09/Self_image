<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Social Mirror</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  margin-top: 20px;
}

button {
  background: black;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  margin-top: 20px;
  cursor: pointer;
}

.progress {
  color: gray;
  margin-bottom: 10px;
}

.option {
  margin: 12px 0;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.option:hover {
  background: #f0f0f0;
}

.hidden {
  display: none;
}

h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<div class="container">

<!-- INTRO -->
<div id="intro" class="card">
  <h1>Your Social Mirror</h1>
  <p>This quiz doesn’t tell you how people see you.</p>
  <p>It reveals how you <b>believe</b> they see you.</p>
  <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">
  <div class="progress" id="progress"></div>
  <div id="question"></div>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden"></div>

</div>

<script>
const questions = [
{
q:"You’re having a really good conversation over text. Suddenly, after your message, they stop replying—even though they’re online.",
options:["They’re busy","They’ll reply later","Did I say something wrong?","They lost interest"]
},
{
q:"You notice someone’s tone becoming slightly different than before.",
options:["Unrelated","They’re tired","Did I cause this?","Something is wrong"]
},
// (keeping rest same for brevity—you can reuse previous list)
];

let current = 0;
let answers = [];

function startQuiz(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("progress").innerText = `Question ${current+1} of ${questions.length}`;
  document.getElementById("question").innerHTML = `<h3>${q.q}</h3>`;

  let html="";
  q.options.forEach((opt,i)=>{
    html+=`<div class="option" onclick="selectOption(${i+1}, this)">${opt}</div>`;
  });
  document.getElementById("options").innerHTML=html;
}

let selectedVal=null;

function selectOption(val, el){
  selectedVal = val;
  document.querySelectorAll(".option").forEach(o=>o.style.background="white");
  el.style.background="#e8f0ff";
}

function nextQuestion(){
  if(!selectedVal){
    alert("Select an option");
    return;
  }
  answers.push(selectedVal);
  selectedVal=null;
  current++;

  if(current<questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let total = answers.reduce((a,b)=>a+b,0);
  let countD = answers.filter(x=>x===4).length;

  let resultHTML="";
  let trait="";

  if(countD>=7){
    trait=`<h3>🧩 Hidden Trait: Conclusion Jumper</h3>
    <p>You don’t stay in uncertainty—you move quickly toward conclusions.</p>`;
  }

  if(total<=50){
    resultHTML = `
    <h2>🌊 THE OVER-INTERPRETER</h2>

    <h3>🧠 What this says about you</h3>
    <p>Moments don’t just pass—you analyze them.
    A delay, a tone shift, a small reaction… everything starts to feel meaningful.</p>

    <p>You’re not making things up—
    but you’re often adding layers that may not exist.</p>

    <h3>🔍 Why you think this way</h3>
    <p>Your mind is trying to stay ahead—to protect you.
    So it looks for patterns, even in small things.</p>

    <h3>⚠️ Your blind spot</h3>
    <p>You start treating possibilities like conclusions.</p>

    <h3>🔄 Shift</h3>
    <p><i>Not every pattern I notice is about me.</i></p>
    `;
  }

  document.getElementById("result").innerHTML =
    resultHTML + trait +
    `<hr><p><b>This reveals how you THINK people see you.</b></p>`;
}
</script>

</body>
</html>
