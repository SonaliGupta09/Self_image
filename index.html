<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Perception Quiz</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 700px;
  margin: auto;
  padding: 20px;
  line-height: 1.6;
}
.container {
  display: none;
}
.active {
  display: block;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
}
.progress {
  margin-bottom: 10px;
  color: gray;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="active">
  <h1>Your Social Mirror</h1>
  <p>
    This quiz doesn’t tell you how people actually see you.  
    It reveals how you *believe* others see you.
  </p>
  <p>
    Each question describes a real-life situation.  
    Choose the option that feels closest to your **first natural thought**.
  </p>
  <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="container">
  <div class="progress" id="progress"></div>
  <div id="question"></div>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="result" class="container"></div>

<script>
const questions = [
{
q: "You’re having a really good conversation with someone over text. The flow is natural, engaging—and then after your last message, they stop replying. You notice they’ve been online since then.",
options: [
"They’re probably caught up in something else right now",
"Maybe they’ll reply when they’re free",
"Did I say something that changed the vibe?",
"They’ve lost interest in talking to me"
]
},
{
q: "You’re talking to someone, and mid-conversation their energy shifts. Their replies become shorter, less expressive, and the warmth feels reduced.",
options: [
"Their mood probably shifted for some reason",
"Maybe they’re just tired or distracted",
"Did I do something wrong here?",
"They’re not enjoying this conversation anymore"
]
},
{
q: "You walk into a room where a group is already deeply engaged in conversation. No one immediately acknowledges your presence.",
options: [
"They’re just in the flow of their conversation",
"I’ll wait and join when it feels natural",
"That felt slightly off",
"They don’t really want me here"
]
},
{
q: "Someone compliments you in front of others, and the people around don’t react much.",
options: [
"That’s kind of them, I’ll take it",
"Nice, I appreciate it",
"Do they actually mean it?",
"They’re just saying it to be polite"
]
},
{
q: "You’re sitting with people and they start laughing, occasionally glancing in your direction.",
options: [
"Probably unrelated to me",
"Could just be coincidence",
"I wonder if it’s about me",
"They’re talking about me"
]
},
{
q: "A friend cancels plans at the last moment with a short message and no explanation.",
options: [
"Things come up, it’s okay",
"Maybe something urgent happened",
"Maybe they didn’t feel like meeting",
"They didn’t really want to meet me"
]
},
{
q: "You open up about something personal, but the response you receive is brief and the topic shifts quickly.",
options: [
"Not everyone knows how to respond",
"Maybe they didn’t know what to say",
"Maybe I shared too much",
"They don’t care about what I said"
]
},
{
q: "You make a small but noticeable mistake in front of others.",
options: [
"It’s normal, people move on",
"It happens, no big deal",
"People probably noticed that",
"People now see me differently"
]
},
{
q: "Later, you find out that others made a plan and you weren’t included.",
options: [
"It might have been spontaneous",
"Could be situational",
"Maybe they forgot to include me",
"They chose not to include me"
]
},
{
q: "Someone reads your message but replies much later, even though they were active.",
options: [
"They’ll respond when they can",
"Maybe they were thinking what to say",
"That feels a bit off",
"They’re avoiding the conversation"
]
},
{
q: "You notice a subtle shift in how someone talks to you compared to before.",
options: [
"Could be unrelated to me",
"Maybe they’re having a rough day",
"Did I cause this shift somehow?",
"Something is wrong between us"
]
},
{
q: "In a group setting, you’re quieter than usual and mostly listening.",
options: [
"I’m just taking it in",
"It’s okay to not speak much",
"People might notice this",
"They think I don’t add value"
]
},
{
q: "You greet someone you know, but they don’t respond immediately.",
options: [
"They probably didn’t notice",
"Maybe they’re distracted",
"That felt a bit uncomfortable",
"They ignored me"
]
},
{
q: "You post something you liked online, but it gets very little engagement.",
options: [
"Reach varies, it’s normal",
"Not everyone saw it",
"Maybe it didn’t land well",
"People didn’t like it"
]
},
{
q: "You receive feedback or criticism from someone you respect.",
options: [
"This can help me improve",
"I’ll reflect on it",
"Maybe I made a mistake",
"They see me negatively now"
]
}
];

let current = 0;
let answers = [];

function startQuiz() {
  document.getElementById("intro").classList.remove("active");
  document.getElementById("quiz").classList.add("active");
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("progress").innerText = `Question ${current+1} of ${questions.length}`;
  document.getElementById("question").innerHTML = `<p><b>${q.q}</b></p>`;
  
  let opts = "";
  q.options.forEach((opt, i) => {
    opts += `
      <label>
        <input type="radio" name="option" value="${i+1}">
        ${opt}
      </label><br><br>
    `;
  });
  document.getElementById("options").innerHTML = opts;
}

function nextQuestion() {
  let selected = document.querySelector('input[name="option"]:checked');
  if (!selected) {
    alert("Please select an option");
    return;
  }

  answers.push(parseInt(selected.value));
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}
function showResult() {
  document.getElementById("quiz").classList.remove("active");
  document.getElementById("result").classList.add("active");

  let total = answers.reduce((a,b)=>a+b,0);
  let countC = answers.filter(x=>x===3).length;
  let countD = answers.filter(x=>x===4).length;

  let resultHTML = "";
  let hiddenTrait = "";

  // Hidden Trait Logic
  if (countD >= 7) {
    hiddenTrait = `
    <h4>🧩 Hidden Trait: Conclusion Jumper</h4>
    <p>You don’t stay in uncertainty for long—you move toward conclusions, often negative ones.</p>`;
  } 
  else if (countC >= 7) {
    hiddenTrait = `
    <h4>🧩 Hidden Trait: Silent Doubter</h4>
    <p>You don’t jump to conclusions—but you quietly turn things inward and question yourself.</p>`;
  }

  // RESULT TYPES

  if (total <= 25) {
    resultHTML = `
    <h2>🌿 The Grounded Observer</h2>

    <h3>🧠 What this says about you</h3>
    <p>When something happens, your mind doesn’t rush to fill in the blanks. You let situations exist without immediately making them about you.</p>

    <h3>🔍 Why you think this way</h3>
    <p>You’ve learned that not everything needs interpretation. You allow space before assigning meaning.</p>

    <h3>⚠️ Your blind spot</h3>
    <p>You might sometimes under-read situations. Not everything is neutral—and occasionally something is worth noticing.</p>

    <h3>🔄 Shift thought</h3>
    <p><i>“Not everything is about me—but some things are worth noticing.”</i></p>
    `;
  }

  else if (total <= 38) {
    resultHTML = `
    <h2>⚖️ The Thoughtful Interpreter</h2>

    <h3>🧠 What this says about you</h3>
    <p>You notice shifts and read between lines—but you don’t completely lose yourself in those interpretations.</p>

    <h3>🔍 Why you think this way</h3>
    <p>You understand that behavior can carry meaning, so you reflect—but you try to stay fair.</p>

    <h3>⚠️ Your blind spot</h3>
    <p>You can get stuck in “maybe loops”—not spiraling, but not fully trusting your calm either.</p>

    <h3>🔄 Shift thought</h3>
    <p><i>“I don’t need to solve every behavior I notice.”</i></p>
    `;
  }

  else if (total <= 50) {
    resultHTML = `
    <h2>🌊 The Over-Interpreter</h2>

    <h3>🧠 What this says about you</h3>
    <p>Moments don’t just pass—you analyze them. A delay, a tone shift, a small reaction… everything starts to feel meaningful.</p>
    <p>You’re not making things up—but you’re often adding layers that may not exist.</p>

    <h3>🔍 Why you think this way</h3>
    <p>Your mind is trying to stay ahead—to protect you from being caught off guard. So it looks for patterns, even in small things.</p>

    <h3>⚠️ Your blind spot</h3>
    <p>You start treating possibilities like conclusions. And once that happens, it feels real.</p>

    <h3>🔄 Shift thought</h3>
    <p><i>“Not every pattern I notice is a message about me.”</i></p>
    `;
  }

  else {
    resultHTML = `
    <h2>🌑 The Inner Critic Projector</h2>

    <h3>🧠 What this says about you</h3>
    <p>Many situations don’t feel neutral to you. They feel like quiet signals of judgment, disinterest, or rejection.</p>

    <h3>🔍 Why you think this way</h3>
    <p>Your mind has learned to expect negative perception. So instead of waiting, it fills in the blanks immediately.</p>

    <h3>⚠️ Your blind spot</h3>
    <p>You’re not actually reading people—you’re projecting expectations onto them.</p>

    <h3>🔄 Shift thought</h3>
    <p><i>“What I feel others think about me is not always what they actually think.”</i></p>
    `;
  }

  document.getElementById("result").innerHTML =
    resultHTML +
    hiddenTrait +
    `<hr>
    <p><b>This result doesn’t reveal how people see you.<br>
    It reveals how you believe they see you.</b></p>`;
}
</script>

</body>
</html>
