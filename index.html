<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>How Do You See Yourself Through Others' Eyes?</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
/* ✅ KEEPING YOUR ORIGINAL CSS EXACTLY */
:root {
  --bg: #0c0c0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --border: rgba(255,255,255,0.07);
  --accent: #c9a96e;
  --accent2: #8b7355;
  --text: #e8e4dc;
  --muted: #7a7a8a;
  --glow: rgba(201,169,110,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

/* screens */
.screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.5s; }
.screen.active { opacity: 1; pointer-events: all; }

/* button */
.btn-primary {
  background: var(--accent);
  padding: 14px 32px;
  border: none;
  cursor: pointer;
}

/* quiz */
.option-btn { padding: 14px; margin-top: 10px; display: block; width: 100%; cursor: pointer; }
.option-btn.selected { background: rgba(201,169,110,0.2); }

</style>
</head>

<body>

<!-- LANDING -->
<div id="screen-landing" class="screen active">
  <button id="start-btn" class="btn-primary">Begin the reflection</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div>
    <div id="question-block"></div>
    <button id="btn-back">Back</button>
    <button id="btn-next">Next</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div id="result-inner"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const questions = [
  {
    context: "A text conversation",
    text: "You're having a good conversation...",
    options: [
      "They're probably caught up in something",
      "Maybe they'll reply when they're free",
      "Did I say something that changed the vibe?",
      "They've lost interest in talking to me"
    ]
  }
  // 👉 KEEP REST OF YOUR QUESTIONS HERE
];

const results = [
  {
    range: [15, 60],
    title: "Your Result",
    what: "This is a working demo result."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);

const startBtn = document.getElementById("start-btn");
const nextBtn = document.getElementById("btn-next");
const backBtn = document.getElementById("btn-back");

startBtn.addEventListener("click", startQuiz);
nextBtn.addEventListener("click", nextQuestion);
backBtn.addEventListener("click", prevQuestion);

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startQuiz(){
  showScreen("screen-quiz");
  renderQuestion();
}

function renderQuestion(){
  const q = questions[current];
  const block = document.getElementById("question-block");

  block.innerHTML = `
    <h3>${q.context}</h3>
    <p>${q.text}</p>
    ${q.options.map((opt,i)=>`
      <button class="option-btn ${answers[current]===i?'selected':''}" data-i="${i}">
        ${opt}
      </button>
    `).join("")}
  `;

  document.querySelectorAll(".option-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      answers[current]=Number(btn.dataset.i);
      renderQuestion();
    });
  });

  nextBtn.disabled = answers[current]===null;
}

function nextQuestion(){
  if(current === questions.length-1){
    showResult();
    return;
  }
  current++;
  renderQuestion();
}

function prevQuestion(){
  if(current===0) return;
  current--;
  renderQuestion();
}

function showResult(){
  document.getElementById("result-inner").innerHTML = `
    <h2>Done ✅</h2>
    <button id="restart">Restart</button>
  `;
  document.getElementById("restart").onclick = ()=>{
    current=0;
    answers=new Array(questions.length).fill(null);
    showScreen("screen-landing");
  };
  showScreen("screen-result");
}

});
</script>

</body>
</html>
