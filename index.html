<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Social Mirror</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 700px;
  margin: auto;
  padding: 20px;
  line-height: 1.6;
}
.container { display: none; }
.active { display: block; }
button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
}
.progress {
  margin-bottom: 10px;
  color: gray;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="active">
  <h1>Your Social Mirror</h1>
  <p>
    This quiz doesn’t tell you how people actually see you.  
    It reveals how you <b>believe</b> others see you.
  </p>
  <p>
    Each question describes a real-life situation.  
    Choose the option that feels closest to your first natural thought.
  </p>
  <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="container">
  <div class="progress" id="progress"></div>
  <div id="question"></div>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="result" class="container"></div>

<script>
const questions = [
{
q: "You’re having a really good conversation with someone over text. The flow is natural—and then after your last message, they stop replying. You notice they’ve been online.",
options: ["They’re probably busy","Maybe they’ll reply later","Did I say something wrong?","They’ve lost interest in me"]
},
{
q: "You’re talking to someone and their energy suddenly changes—shorter replies, less warmth.",
options: ["Mood shift","They’re tired","Did I do something?","They’re not enjoying this"]
},
{
q: "You enter a room where people are already engaged, and no one acknowledges you.",
options: ["They’re busy talking","I’ll join later","That felt off","They don’t want me here"]
},
{
q: "Someone compliments you in front of others.",
options: ["That’s kind","I appreciate it","Do they mean it?","They’re just being polite"]
},
{
q: "People laugh while glancing at you.",
options: ["Unrelated","Coincidence","Is it about me?","They’re talking about me"]
},
{
q: "A friend cancels plans last minute.",
options: ["It happens","Something came up","Maybe they didn’t feel like it","They didn’t want to meet me"]
},
{
q: "You share something personal and get a short response.",
options: ["People differ","They didn’t know what to say","Maybe I shared too much","They don’t care"]
},
{
q: "You make a small mistake in public.",
options: ["Normal","No big deal","People noticed","People judge me now"]
},
{
q: "Others made a plan and didn’t include you.",
options: ["Spontaneous","Situational","They forgot","They excluded me"]
},
{
q: "Someone reads your message but replies late.",
options: ["They’ll reply later","Thinking","Feels off","Avoiding me"]
},
{
q: "You notice a tone shift in someone.",
options: ["Unrelated","Bad day","Did I cause it?","Something is wrong"]
},
{
q: "You’re quiet in a group.",
options: ["Just listening","That’s okay","People notice","I add no value"]
},
{
q: "You greet someone and they don’t respond.",
options: ["Didn’t notice","Distracted","Felt odd","Ignored me"]
},
{
q: "Your post gets low engagement.",
options: ["Normal","Not seen","Not that good","People didn’t like it"]
},
{
q: "You receive criticism.",
options: ["Helpful","I’ll reflect","I messed up","They see me negatively"]
}
];

let current = 0;
let answers = [];

function startQuiz() {
  document.getElementById("intro").classList.remove("active");
  document.getElementById("quiz").classList.add("active");
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("progress").innerText = `Question ${current+1} of ${questions.length}`;
  document.getElementById("question").innerHTML = `<p><b>${q.q}</b></p>`;

  let opts = "";
  q.options.forEach((opt, i) => {
    opts += `
      <label>
        <input type="radio" name="option" value="${i+1}">
        ${opt}
      </label><br><br>
    `;
  });
  document.getElementById("options").innerHTML = opts;
}

function nextQuestion() {
  let selected = document.querySelector('input[name="option"]:checked');
  if (!selected) {
    alert("Please select an option");
    return;
  }

  answers.push(parseInt(selected.value));
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").classList.remove("active");
  document.getElementById("result").classList.add("active");

  let total = answers.reduce((a,b)=>a+b,0);
  let countC = answers.filter(x=>x===3).length;
  let countD = answers.filter(x=>x===4).length;

  let resultHTML = "";
  let hiddenTrait = "";

  if (countD >= 7) {
    hiddenTrait = `<h4>🧩 Hidden Trait: Conclusion Jumper</h4>
    <p>You don’t stay in uncertainty—you quickly form conclusions about what others think.</p>`;
  } else if (countC >= 7) {
    hiddenTrait = `<h4>🧩 Hidden Trait: Silent Doubter</h4>
    <p>You tend to turn situations inward and question yourself quietly.</p>`;
  }

  if (total <= 25) {
    resultHTML = `<h2>🌿 The Grounded Observer</h2>
    <p>You don’t rush to interpret situations. You let things be before making them about you.</p>
    <p><b>Blind spot:</b> You may under-read signals sometimes.</p>
    <p><i>Shift:</i> Not everything is about me—but some things are worth noticing.</p>`;
  } 
  else if (total <= 38) {
    resultHTML = `<h2>⚖️ The Thoughtful Interpreter</h2>
    <p>You notice behavior but don’t fully lose yourself in it.</p>
    <p><b>Blind spot:</b> You may stay stuck in “maybe loops.”</p>
    <p><i>Shift:</i> I don’t need to solve every behavior.</p>`;
  } 
  else if (total <= 50) {
    resultHTML = `<h2>🌊 The Over-Interpreter</h2>
    <p>Moments don’t just pass—you analyze them deeply.</p>
    <p>You’re not making things up—but often adding layers.</p>
    <p><b>Blind spot:</b> You treat possibilities like conclusions.</p>
    <p><i>Shift:</i> Not every pattern I notice is about me.</p>`;
  } 
  else {
    resultHTML = `<h2>🌑 The Inner Critic Projector</h2>
    <p>You often feel people are judging you even when nothing is said.</p>
    <p><b>Blind spot:</b> You project expectations onto others.</p>
    <p><i>Shift:</i> What I feel others think is not always true.</p>`;
  }

  document.getElementById("result").innerHTML =
    resultHTML + hiddenTrait +
    `<hr>
    <p><b>This result doesn’t reveal how people see you.<br>
    It reveals how you believe they see you.</b></p>`;
}
</script>

</body>
</html>
