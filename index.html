<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>How Do You See Yourself Through Others' Eyes?</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
/* (UNCHANGED — your full CSS stays exactly same) */
</style>
</head>
<body>

<!-- LANDING -->
<div id="screen-landing" class="screen active">
  <div class="landing-inner">
    <div class="eyebrow">Self-Reflection Quiz</div>
    <h1>How do you <em>believe</em><br>others see you?</h1>
    <p class="landing-desc">
      15 situational questions. No right answers.<br>
      Discover the lens through which you interpret<br>the world — and what it reveals about you.
    </p>
    <button class="btn-primary" id="start-btn">
      Begin the reflection <span>→</span>
    </button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-inner">
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span class="progress-label">Question</span>
        <span class="progress-count" id="q-count">1 / 15</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="question-block" id="question-block"></div>

    <div class="quiz-nav">
      <button class="btn-ghost" id="btn-back">← Back</button>
      <button class="btn-next" id="btn-next">Next →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-inner" id="result-inner"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const questions = [...]; // KEEP YOUR ORIGINAL QUESTIONS ARRAY
  const results = [...];   // KEEP YOUR ORIGINAL RESULTS ARRAY

  let current = 0;
  let answers = new Array(15).fill(null);

  const startBtn = document.getElementById('start-btn');
  const nextBtn = document.getElementById('btn-next');
  const backBtn = document.getElementById('btn-back');

  if (!startBtn) {
    console.error("Start button not found");
    return;
  }

  startBtn.addEventListener('click', startQuiz);
  nextBtn.addEventListener('click', nextQuestion);
  backBtn.addEventListener('click', prevQuestion);

  function startQuiz() {
    showScreen('screen-quiz');
    renderQuestion();
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function renderQuestion() {
    const q = questions[current];
    const block = document.getElementById('question-block');

    block.innerHTML = `
      <div class="q-context">${q.context}</div>
      <div class="q-text">${q.text}</div>
      <div class="options-grid">
        ${q.options.map((opt, i) => `
          <button class="option-btn ${answers[current] === i ? 'selected' : ''}" data-index="${i}">
            <span class="opt-letter">${String.fromCharCode(65+i)}</span>
            <span class="opt-text">${opt}</span>
          </button>
        `).join('')}
      </div>
    `;

    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => selectOption(Number(btn.dataset.index)));
    });

    document.getElementById('q-count').textContent = `${current + 1} / 15`;
    document.getElementById('progress-fill').style.width = (current / 15) * 100 + '%';

    backBtn.disabled = current === 0;
    nextBtn.disabled = answers[current] === null;
    nextBtn.textContent = current === 14 ? 'See Results →' : 'Next →';
  }

  function selectOption(i) {
    answers[current] = i;
    document.querySelectorAll('.option-btn').forEach((btn, idx) => {
      btn.classList.toggle('selected', idx === i);
    });
    nextBtn.disabled = false;
  }

  function nextQuestion() {
    if (answers[current] === null) return;

    if (current === 14) {
      showResult();
      return;
    }

    current++;
    renderQuestion();
  }

  function prevQuestion() {
    if (current === 0) return;
    current--;
    renderQuestion();
  }

  function showResult() {
    const total = answers.reduce((sum, a) => sum + (a + 1), 0);
    const res = results.find(r => total >= r.range[0] && total <= r.range[1]) || results[3];

    document.getElementById('result-inner').innerHTML = `
      <h2>${res.title.replace("\n","<br>")}</h2>
      <p>${res.what}</p>
      <button id="restart-btn" class="btn-primary">Retake</button>
    `;

    document.getElementById('restart-btn').addEventListener('click', restartQuiz);

    showScreen('screen-result');
  }

  function restartQuiz() {
    current = 0;
    answers = new Array(15).fill(null);
    showScreen('screen-landing');
  }

});
</script>

</body>
</html>
